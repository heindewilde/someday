name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [[ -n "$PREV" ]]; then
            RANGE="${PREV}..${TAG}"
            HEADER="Changes since \`${PREV}\`"
          else
            RANGE=""
            HEADER="Initial release"
          fi

          log_range() {
            if [[ -n "$RANGE" ]]; then
              git log --pretty=format:"%s" "$RANGE"
            else
              git log --pretty=format:"%s"
            fi
          }

          section() {
            log_range | grep -E "^$1(\(.+\))?:" | sed -E "s/^$1(\(.+\))?:[[:space:]]*//" || true
          }

          {
            echo "$HEADER"
            echo ""

            FEATS=$(section feat)
            FIXES=$(section fix)
            PERFS=$(section perf)
            DOCS=$(section docs)

            if [[ -n "$FEATS" ]]; then
              echo "### New"
              while IFS= read -r line; do echo "- $line"; done <<< "$FEATS"
              echo ""
            fi
            if [[ -n "$FIXES" ]]; then
              echo "### Fixed"
              while IFS= read -r line; do echo "- $line"; done <<< "$FIXES"
              echo ""
            fi
            if [[ -n "$PERFS" ]]; then
              echo "### Performance"
              while IFS= read -r line; do echo "- $line"; done <<< "$PERFS"
              echo ""
            fi
            if [[ -n "$DOCS" ]]; then
              echo "### Documentation"
              while IFS= read -r line; do echo "- $line"; done <<< "$DOCS"
              echo ""
            fi

            echo "---"
            echo "**Upgrade:** \`docker compose pull && docker compose up -d\`"
            echo ""
            echo "**Fresh install:** see the [self-hosting guide](https://github.com/${{ github.repository }}#-self-hosting)."
          } > notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          make_latest: true
