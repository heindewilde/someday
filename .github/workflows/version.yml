name: Auto-version

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    # Don't recurse on the version bump commit itself
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        id: bump
        run: |
          set -euo pipefail

          # Commits since the last version bump (fall back to full log on first run).
          # || true absorbs SIGPIPE (exit 141) from git log when awk exits early.
          LAST=$(git log --pretty=format:"%H %s" | awk '/chore: bump version/{print $1; exit}') || true
          if [[ -n "$LAST" ]]; then
            COMMITS=$(git log --pretty=format:"%s" "${LAST}..HEAD")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          HAS_FEAT=$(echo "$COMMITS" | grep -E "^feat(\(.+\))?:"               || true)
          HAS_FIX=$(echo "$COMMITS"  | grep -E "^(fix|perf|refactor)(\(.+\))?:" || true)

          if   [[ -n "$HAS_FEAT" ]]; then BUMP=minor
          elif [[ -n "$HAS_FIX"  ]]; then BUMP=patch
          else
            echo "Only chore/docs/ci commits — no version bump needed."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE=$(node -p "require('./package.json').version")
          npm version $BUMP --no-git-tag-version
          AFTER=$(node -p "require('./package.json').version")

          FEATS=$(echo "$COMMITS" | grep -E "^feat(\(.+\))?:"       | sed -E "s/^feat(\(.+\))?:[[:space:]]*//" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^(fix|perf)(\(.+\))?:" | sed -E "s/^(fix|perf)(\(.+\))?:[[:space:]]*//" || true)

          BODY=""
          if [[ -n "$FEATS" ]]; then
            BODY+=$'\n\nNew:'
            while IFS= read -r l; do BODY+=$'\n'"  - $l"; done <<< "$FEATS"
          fi
          if [[ -n "$FIXES" ]]; then
            BODY+=$'\n\nFixed:'
            while IFS= read -r l; do BODY+=$'\n'"  - $l"; done <<< "$FIXES"
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${AFTER}${BODY}"
          git push

          echo "bump=${BUMP}"     >> "$GITHUB_OUTPUT"
          echo "version=${AFTER}" >> "$GITHUB_OUTPUT"
          echo "Bumped ${BUMP}: ${BEFORE} → ${AFTER}"

      # Minor bumps get a Git tag, which triggers docker.yml to build the versioned
      # image and publish the GitHub Release. Requires RELEASE_TOKEN (a PAT with
      # contents: write) because GITHUB_TOKEN pushes don't trigger other workflows.
      # Patch bumps accumulate silently until the next feature release.
      - name: Tag release
        if: steps.bump.outputs.bump == 'minor' && env.RELEASE_TOKEN != ''
        run: |
          TAG="v${{ steps.bump.outputs.version }}"
          git tag "$TAG"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$TAG"
          echo "Pushed ${TAG} — docker.yml will build the versioned image and publish the GitHub Release."

      - name: Warn if RELEASE_TOKEN not configured
        if: steps.bump.outputs.bump == 'minor' && env.RELEASE_TOKEN == ''
        run: |
          echo "::warning::Minor bump detected but RELEASE_TOKEN secret is not set."
          echo "::warning::Add a PAT (contents: write) as RELEASE_TOKEN to enable automatic tagging and releases."
